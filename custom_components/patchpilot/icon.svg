<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">PatchPilot icon</title>
  <desc id="desc">A smart home on an autopilot-style update route with a navigation pointer and check mark.</desc>
  <defs>
    <linearGradient id="sky" x1="34" y1="20" x2="220" y2="234" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1fd6ff"/>
      <stop offset="0.52" stop-color="#0b8edb"/>
      <stop offset="1" stop-color="#103b78"/>
    </linearGradient>
    <linearGradient id="orbit" x1="48" y1="52" x2="208" y2="214" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d6ff6b"/>
      <stop offset="0.46" stop-color="#39e7a5"/>
      <stop offset="1" stop-color="#2cc7ff"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#061425" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="56" fill="#071827"/>
  <circle cx="128" cy="128" r="104" fill="url(#sky)"/>
  <circle cx="128" cy="128" r="90" fill="#071827" opacity="0.26"/>

  <g fill="none" stroke="url(#orbit)" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft-shadow)">
    <path d="M62 106a75 75 0 0 1 126-35" stroke-width="14"/>
    <path d="M188 71v34h-34" stroke-width="14"/>
    <path d="M194 150a75 75 0 0 1-126 35" stroke-width="14"/>
    <path d="M68 185v-34h34" stroke-width="14"/>
  </g>

  <g filter="url(#soft-shadow)">
    <path d="M72 121 128 76l56 45v65a10 10 0 0 1-10 10H82a10 10 0 0 1-10-10z" fill="#f8fbff"/>
    <path d="M93 121v53h70v-53l-35-28z" fill="#c7f4ff"/>
    <path d="M72 121 128 76l56 45" fill="none" stroke="#071827" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M91 196h74" fill="none" stroke="#071827" stroke-width="12" stroke-linecap="round"/>
    <path d="M107 155 123 171l34-42" fill="none" stroke="#20d78b" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#soft-shadow)">
    <circle cx="194" cy="63" r="23" fill="#d6ff6b" stroke="#071827" stroke-width="8"/>
    <path d="M202 51 188 69l-8-3 32 30-10-45z" fill="#071827" stroke="#071827" stroke-width="4" stroke-linejoin="round"/>
    <path d="M190 68 202 51" fill="none" stroke="#d6ff6b" stroke-width="4" stroke-linecap="round"/>
  </g>

  <path d="M47 128c20-25 49-39 82-39 31 0 58 13 78 35" fill="none" stroke="#f8fbff" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 15" opacity="0.72"/>
</svg>
